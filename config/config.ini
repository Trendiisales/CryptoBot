; =============================================================================
; config.ini — CryptoBot C++ Configuration
;
; SHADOW MODE: Set shadow_mode = true to paper-trade using live credentials.
;   - All WebSocket feeds are LIVE (real market data)
;   - Order placement is SIMULATED (no real orders sent)
;   - P&L is tracked in virtual balance
;   - Full fee gate and risk enforcement still apply
;
; LIVE MODE:  Disabled in this build. Keep shadow_mode = true.
; =============================================================================

[bot]
shadow_mode         = true          ; true = paper trade, false = real trading
testnet             = false         ; true = use Binance testnet endpoints
allow_short_entries = false         ; spot paper mode is long-only, SELL signals exit longs
log_level           = INFO          ; DEBUG | INFO | WARNING | ERROR
log_file            = logs/bot.log
trade_log_file      = logs/trades.csv ; append-only CSV written on each trade close
metrics_port        = 9090

[exchange]
api_key             = YOUR_API_KEY_HERE
api_secret          = YOUR_API_SECRET_HERE

; REST endpoints
rest_base_live      = https://api.binance.com/api
rest_base_testnet   = https://testnet.binance.vision/api

; WebSocket endpoints
ws_spot_live        = wss://stream.binance.com:9443/ws
ws_spot_testnet     = wss://testnet.binance.vision/ws
ws_perp_live        = wss://fstream.binance.com/ws

; Connection tuning
ws_ping_interval_ms = 20000
ws_reconnect_delay_ms = 1000
ws_max_reconnects   = 10

[pairs]
; Spot pairs to trade (comma separated)
spot               = BTCUSDT,ETHUSDT,SOLUSDT,BNBUSDT,XRPUSDT
; Perp pairs to consume for signals ONLY (no perp trading)
perp_signal        = BTCUSDT,ETHUSDT,SOLUSDT

[fees]
; Basis points (1 bp = 0.01%)
maker_bps           = 7.5           ; Binance maker with BNB discount
taker_bps           = 7.5           ; Binance taker with BNB discount
min_net_edge_bps    = 8.0           ; Hard floor: net edge must exceed this
slippage_buffer_bps = 2.0           ; Slippage reserve on top of fee cost
max_spread_bps      = 6.0           ; Reject trade if spread > this

[risk]
position_size_pct   = 5.0           ; % of equity per trade
max_kelly_fraction  = 0.25          ; Cap on Kelly sizing
max_position_usd    = 10000.0       ; Per-pair max notional
max_total_usd       = 40000.0       ; Total portfolio cap
daily_dd_limit_pct  = 2.0           ; Daily drawdown halt threshold
total_dd_limit_pct  = 8.0           ; Total drawdown kill switch
stop_loss_bps       = 30.0          ; Hard stop per trade
trailing_activate_bps = 20.0        ; Activate trailing after this gain
trailing_distance_bps = 15.0        ; Trailing stop distance
max_open_trades     = 4
min_signal_interval_sec = 60

[strategy]
ema_fast            = 9
ema_slow            = 21
ema_trend           = 55
rsi_period          = 14
rsi_oversold        = 35.0
rsi_overbought      = 65.0
bb_period           = 20
bb_std              = 2.0
bb_entry_zscore     = 1.8
vwap_entry_bps      = 20.0
ofi_threshold       = 0.65
funding_long_bias_bps  = 3.0
funding_short_bias_bps = -3.0
volume_confirm_ratio   = 1.3
candle_history         = 200

[execution]
use_post_only       = false
post_only_timeout_ms = 30000
max_requeue         = 5
twap_min_usd        = 5000.0
twap_slices         = 5
twap_interval_ms    = 10000

[shadow]
; Shadow mode virtual account settings
initial_balance_usd = 100000.0
; Simulated fill latency (microseconds) — mimics real exchange round-trip
simulated_fill_latency_us = 3500
; Simulate partial fills (realistic paper trading)
simulate_partial_fills = true
partial_fill_probability = 0.15

[telegram]
enabled             = false
token               = YOUR_TELEGRAM_BOT_TOKEN
chat_id             = YOUR_CHAT_ID

[infra]
redis_host          = 127.0.0.1
redis_port          = 6379
heartbeat_sec       = 30
